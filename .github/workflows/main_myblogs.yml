# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - myblogs

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      # Build Backend
      - name: npm install, build, and test (Backend)
        working-directory: backend
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      # Build Frontend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: CI=false npm run build

      # Copy frontend build to backend
      - name: Copy frontend build to backend
        run: |
          mkdir -p backend/build
          cp -r frontend/build/* backend/build/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: backend
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_68bed848-a048-4f9e-9096-9c9a421e3475 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8fee6aae-28b9-4544-b702-663d5db387c1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_b2edb08b-9d4d-45c1-8f5f-11955a4540b5 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'myblogs'
          slot-name: 'Production'
          package: ./backend
